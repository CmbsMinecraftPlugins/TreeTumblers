templates:
  # The path where all the template worlds are contained
  # Use & to refer to the plugin's data container (plugins/TreeTumblers in most cases)
  world_root: "&/templates/worlds"

lobby:
  # TODO: Make this point to an actual lobby lol
  world: world
  position: [0.0, 78.0, 0.0]

