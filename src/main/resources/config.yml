database:
  # Playing without a database should only be used if one isn't available, and you have a vanilla whitelist
  # This makes it so teams, scores, and any other persisting data will reset when the server restarts
  enabled: true

  # If enabled is false, these fields are not required
  host:
  port:
  username:
  password:
  database:

event:
  # Determines if scores should be saved past a restart
  event_mode: true

  cutscene:
    first: [1.13,198.19,14.26,-125.2,40.2]
  voting:
    dome_start: [-8,189,24]
    dome_end: [26,197,-11]
    quadrant_separator: SMOOTH_QUARTZ_SLAB
    quadrant_replacement: SMOOTH_QUARTZ
    quadrants:
      # x1,y1,z1,x2,y2,z2
      - [10,192,7,23,188,-6]
      - [10,192,9,23,188,22]
      - [8,192,23,-5,188,9]
      - [8,192,7,-5,188,-6]
    logos:
      - [17, 198, 0]
      - [17, 198, 16]
      - [1, 198, 16]
      - [1, 198, 0]
    inactive_quadrant_material: GRAY_CONCRETE
    center: [9,191,8]

templates:
  # Use & to refer to the plugin's data container (plugins/TreeTumblers in most cases)

  # The path where all the template worlds are contained
  world_root: "&/templates/worlds"
  party_games: "&/templates/party"
  dioramas: "&/templates/dioramas"

lobby:
  world: hub
  position: [-20.0, 209.0, 5.0,-90.0,0.0]

